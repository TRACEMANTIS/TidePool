version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true
      - LOG_LEVEL=debug

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: tidepool-frontend-dev
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tidepool-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tidepool
