version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tidepool-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tidepool:${DB_PASSWORD:-tidepool_dev}@postgres:5432/tidepool
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tidepool

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tidepool-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tidepool:${DB_PASSWORD:-tidepool_dev}@postgres:5432/tidepool
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tidepool

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tidepool-beat
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tidepool:${DB_PASSWORD:-tidepool_dev}@postgres:5432/tidepool
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tidepool

  postgres:
    image: postgres:16-alpine
    container_name: tidepool-postgres
    environment:
      POSTGRES_DB: tidepool
      POSTGRES_USER: tidepool
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tidepool_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidepool -d tidepool"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tidepool

  redis:
    image: redis:7-alpine
    container_name: tidepool-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tidepool

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tidepool-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - tidepool

volumes:
  postgres_data:
  redis_data:

networks:
  tidepool:
    driver: bridge
