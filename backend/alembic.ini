# Alembic configuration for TidePool backend.

[alembic]
script_location = alembic

# The SQLAlchemy URL is overridden at runtime by env.py (from app.config).
# This fallback is only used if env.py fails to set it.
sqlalchemy.url = postgresql+psycopg2://tidepool:tidepool_dev@localhost:5432/tidepool

# Template used to generate migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone for 'create_date' in migration files.
timezone = UTC

# Truncate revision strings to 40 characters in 'show' output.
truncate_slug_length = 40

# Set to 'true' to run the environment during 'revision --autogenerate'.
revision_environment = false

[post_write_hooks]

# -- Logging configuration --------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
