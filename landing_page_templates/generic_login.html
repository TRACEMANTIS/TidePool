<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ company_name }} - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrapper{width:100%;max-width:400px;padding:20px}
.login-card{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:40px 36px;text-align:center}
.logo-area{margin-bottom:24px}
.logo-area img{max-width:180px;max-height:60px;object-fit:contain}
.logo-placeholder{width:64px;height:64px;border-radius:12px;background:#e8ecf1;display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px}
.logo-placeholder svg{width:32px;height:32px}
.company-name{font-size:22px;font-weight:600;color:#1a2b4a;margin-bottom:4px}
.subtitle{font-size:14px;color:#6b7a94;margin-bottom:32px}
.form-group{margin-bottom:20px;text-align:left}
.form-group label{display:block;font-size:13px;font-weight:500;color:#3a4a5c;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;font-size:14px;border:1px solid #d1d5db;border-radius:6px;outline:none;font-family:inherit;transition:border-color 0.15s,box-shadow 0.15s}
.form-group input:focus{border-color:#3b6de0;box-shadow:0 0 0 3px rgba(59,109,224,0.1)}
.form-group input::placeholder{color:#a0a8b4}
.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;text-align:left}
.remember-row .checkbox-group{display:flex;align-items:center;gap:6px}
.remember-row input[type="checkbox"]{width:16px;height:16px;accent-color:#3b6de0}
.remember-row label{font-size:13px;color:#6b7a94;cursor:pointer}
.remember-row a{font-size:13px;color:#3b6de0;text-decoration:none}
.remember-row a:hover{text-decoration:underline}
.btn-signin{width:100%;background:#3b6de0;color:#fff;border:none;border-radius:6px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s}
.btn-signin:hover{background:#2f5bc0}
.btn-signin:focus{outline:2px solid #2f5bc0;outline-offset:2px}
.footer-text{margin-top:24px;font-size:12px;color:#a0a8b4;text-align:center}
.footer-text a{color:#3b6de0;text-decoration:none}
.footer-text a:hover{text-decoration:underline}
@media(max-width:480px){.login-card{padding:28px 20px;border-radius:0;box-shadow:none}}
</style>
</head>
<body>
<div class="login-wrapper">
<div class="login-card">
<div class="logo-area">
{% if company_logo_url %}
<img src="{{ company_logo_url }}" alt="{{ company_name }} logo">
{% else %}
<div class="logo-placeholder">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#6b7a94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="3" width="18" height="18" rx="3"/>
<circle cx="12" cy="10" r="3"/>
<path d="M6 21v-1a6 6 0 0 1 12 0v1"/>
</svg>
</div>
{% endif %}
</div>
<h1 class="company-name">{{ company_name }}</h1>
<p class="subtitle">Sign in to your account</p>
<form id="loginForm" method="POST" action="{{ submit_url }}">
<input type="hidden" name="recipient_token" value="{{ recipient_token }}">
<div class="form-group">
<label for="emailInput">Email or Username</label>
<input type="text" id="emailInput" name="email" placeholder="you@company.com" autocomplete="username" required>
</div>
<div class="form-group">
<label for="passwordInput">Password</label>
<input type="password" id="passwordInput" name="password" placeholder="Enter your password" autocomplete="current-password" required>
</div>
<div class="remember-row">
<div class="checkbox-group">
<input type="checkbox" id="rememberMe" name="remember_me">
<label for="rememberMe">Remember me</label>
</div>
<a href="#" onclick="return false;">Forgot password?</a>
</div>
<button type="submit" class="btn-signin">Sign In</button>
</form>
<div class="footer-text">
<p>Need an account? <a href="#" onclick="return false;">Contact your administrator</a></p>
</div>
</div>
</div>
</body>
</html>
