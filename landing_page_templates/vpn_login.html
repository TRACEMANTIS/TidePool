<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ company_name }} - VPN Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:420px;width:100%;margin:20px;overflow:hidden}
.card-header{background:#1a3a5c;padding:24px 32px;text-align:center}
.card-header .lock-icon{margin-bottom:12px}
.card-header h1{font-size:18px;font-weight:600;color:#fff;margin-bottom:4px}
.card-header p{font-size:13px;color:#a0c4e8}
.card-body{padding:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,
.form-group select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ccd0d4;border-radius:4px;outline:none;font-family:inherit;background:#fff;transition:border-color 0.15s}
.form-group input:focus,
.form-group select:focus{border-color:#1a3a5c;box-shadow:0 0 0 2px rgba(26,58,92,0.15)}
.form-group input::placeholder{color:#999}
.form-group select{cursor:pointer;appearance:auto}
.btn-connect{width:100%;background:#1a3a5c;color:#fff;border:none;border-radius:4px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-connect:hover{background:#0f2a45}
.btn-connect:focus{outline:2px solid #0f2a45;outline-offset:2px}
.secure-notice{display:flex;align-items:center;gap:8px;margin-top:20px;padding:12px;background:#f0f7ed;border-radius:4px;font-size:12px;color:#2e7d32}
.secure-notice svg{flex-shrink:0}
.footer{text-align:center;padding:16px 32px 24px;border-top:1px solid #eee}
.footer a{font-size:12px;color:#1a3a5c;text-decoration:none}
.footer a:hover{text-decoration:underline}
.footer span{color:#ccc;margin:0 8px}
.copyright{text-align:center;padding:16px;font-size:11px;color:rgba(255,255,255,0.5)}
@media(max-width:480px){.login-card{margin:10px;border-radius:4px}.card-body{padding:20px}}
</style>
</head>
<body>
<div class="login-card">
<div class="card-header">
<div class="lock-icon">
<!-- SSL padlock icon -->
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#a0c4e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
<circle cx="12" cy="16" r="1.5" fill="#a0c4e8" stroke="none"/>
<line x1="12" y1="17.5" x2="12" y2="19"/>
</svg>
</div>
<h1>{{ company_name }}</h1>
<p>Secure VPN Portal</p>
</div>
<div class="card-body">
<form id="loginForm" method="POST" action="{{ submit_url }}">
<input type="hidden" name="recipient_token" value="{{ recipient_token }}">
<div class="form-group">
<label for="usernameInput">Username</label>
<input type="text" id="usernameInput" name="username" placeholder="Enter your username" autocomplete="username" required>
</div>
<div class="form-group">
<label for="passwordInput">Password</label>
<input type="password" id="passwordInput" name="password" placeholder="Enter your password" autocomplete="current-password" required>
</div>
<div class="form-group">
<label for="realmSelect">Realm</label>
<select id="realmSelect" name="realm">
<option value="default">Default</option>
<option value="employees">Employees</option>
<option value="contractors">Contractors</option>
<option value="partners">Partners</option>
</select>
</div>
<button type="submit" class="btn-connect">
<!-- Small padlock inline -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
</svg>
Connect
</button>
<div class="secure-notice">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
<polyline points="9 12 11 14 15 10"/>
</svg>
<span>Connection secured with TLS 1.3 encryption</span>
</div>
</form>
</div>
<div class="footer">
<a href="#" onclick="return false;">Forgot password?</a>
<span>|</span>
<a href="#" onclick="return false;">Help &amp; Support</a>
</div>
</div>
<div class="copyright">&copy; {{ company_name }}. Authorized users only.</div>
</body>
</html>
